<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AiCrew - 数字人精剪</title>
<link rel="stylesheet" href="../css/theme.css">
<style>
.layout{display:flex;gap:24px;flex-wrap:wrap}
.left{flex:1;min-width:300px;display:flex;flex-direction:column;gap:20px}
.right{flex:1;min-width:300px;display:flex;flex-direction:column;gap:20px}
.avatar-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px}
.avatar-card{background:var(--bg-glass);border:2px solid var(--border-glass);border-radius:var(--radius-sm);padding:12px;text-align:center;cursor:pointer;transition:var(--transition)}
.avatar-card:hover,.avatar-card.active{border-color:var(--accent-2);box-shadow:0 0 20px rgba(168,85,247,0.2)}
.avatar-card .avatar-icon{font-size:2.5rem;margin-bottom:8px}
.avatar-card .name{font-size:0.8rem;color:var(--text-secondary)}
.player-box{background:rgba(0,0,0,0.3);border-radius:var(--radius);height:300px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;border:1px solid var(--border-glass)}
.player-box .play-btn{width:64px;height:64px;border-radius:50%;background:var(--gradient-2);display:flex;align-items:center;justify-content:center;font-size:1.5rem;cursor:pointer;box-shadow:0 0 30px rgba(6,182,212,0.3);transition:var(--transition)}
.player-box .play-btn:hover{transform:scale(1.1)}
.script-box{background:var(--bg-glass);border:1px solid var(--border-glass);border-radius:var(--radius-sm);padding:16px}
.script-box textarea{width:100%;height:120px;background:transparent;border:none;color:var(--text-primary);font-family:inherit;font-size:0.875rem;resize:vertical;outline:none;line-height:1.6}
.script-box textarea::placeholder{color:var(--text-muted)}
.gen-options{display:flex;gap:12px;flex-wrap:wrap}
.gen-opt{flex:1;min-width:100px;background:var(--bg-glass);border:1px solid var(--border-glass);border-radius:var(--radius-sm);padding:12px;text-align:center;cursor:pointer;transition:var(--transition)}
.gen-opt:hover,.gen-opt.active{border-color:var(--accent-4)}
.gen-opt .label{font-size:0.75rem;color:var(--text-muted);margin-top:4px}
.gen-opt .val{font-size:1rem;font-weight:600}
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="app">
<aside class="sidebar">
  <div class="sidebar-logo">⚡ AiCrew</div>
  <nav>
    <div class="nav-section"><div class="nav-label">首页</div><a class="nav-item" href="dashboard.html"><span class="icon">📊</span>数据总览</a></div>
    <div class="nav-section"><div class="nav-label">AI创作</div><a class="nav-item" href="short-video.html"><span class="icon">🎬</span>短视频矩阵</a><a class="nav-item" href="multi-scene.html"><span class="icon">✂️</span>多场景剪辑</a><a class="nav-item" href="avatar-custom.html"><span class="icon">👤</span>形象定制</a><a class="nav-item active" href="digital-human.html"><span class="icon">🤖</span>数字人精剪</a></div>
    <div class="nav-section"><div class="nav-label">AI拓客</div><a class="nav-item" href="smart-acquire.html"><span class="icon">🎯</span>智能获客</a><a class="nav-item" href="map-acquire.html"><span class="icon">🗺️</span>地图获客</a></div>
    <div class="nav-section"><div class="nav-label">AI个微</div><a class="nav-item" href="personal-chat.html"><span class="icon">💬</span>聚合聊天</a></div>
    <div class="nav-section"><div class="nav-label">AI企微</div><a class="nav-item" href="wecom-chat.html"><span class="icon">🏢</span>聚合聊天</a></div>
    <div class="nav-section"><div class="nav-label">AI人事</div><a class="nav-item" href="boss-manage.html"><span class="icon">👔</span>Boss管理</a></div>
    <div class="nav-section"><div class="nav-label">算力中心</div><a class="nav-item" href="compute-center.html"><span class="icon">⚡</span>算力消耗</a></div>
    <div class="nav-section"><div class="nav-label">系统</div><a class="nav-item" href="settings.html"><span class="icon">⚙️</span>系统设置</a></div>
  </nav>
</aside>
<main class="main-content">
  <div class="page-header"><h1 class="page-title">🤖 数字人精剪</h1><button class="btn btn-primary">🎬 创建视频</button></div>
  <div class="layout">
    <div class="left">
      <div class="glass-card animate-in">
        <h3 style="font-size:0.9rem;margin-bottom:16px">选择数字人形象</h3>
        <div class="avatar-grid">
          <div class="avatar-card active"><div class="avatar-icon">👩‍💼</div><div class="name">商务女</div></div>
          <div class="avatar-card"><div class="avatar-icon">👨‍💼</div><div class="name">商务男</div></div>
          <div class="avatar-card"><div class="avatar-icon">👩‍🏫</div><div class="name">教师</div></div>
          <div class="avatar-card"><div class="avatar-icon">🧑‍💻</div><div class="name">科技风</div></div>
          <div class="avatar-card"><div class="avatar-icon">👩‍🎨</div><div class="name">创意风</div></div>
          <div class="avatar-card"><div class="avatar-icon">+ 自定义</div><div class="name">上传形象</div></div>
        </div>
      </div>
      <div class="glass-card animate-in animate-delay-1">
        <h3 style="font-size:0.9rem;margin-bottom:12px">📝 口播脚本</h3>
        <div class="script-box"><textarea placeholder="输入数字人口播文案...&#10;&#10;例如：大家好，欢迎来到AiCrew，今天我给大家介绍一款全新的AI获客工具..."></textarea></div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px">
          <span style="font-size:0.75rem;color:var(--text-muted)">预计时长：0秒</span>
          <button class="btn btn-secondary" style="padding:6px 12px;font-size:0.8rem">🎤 语音合成</button>
        </div>
      </div>
    </div>
    <div class="right">
      <div class="glass-card animate-in animate-delay-2">
        <h3 style="font-size:0.9rem;margin-bottom:16px">📺 预览播放</h3>
        <div class="player-box">
          <div class="play-btn">▶</div>
          <p style="color:var(--text-muted);font-size:0.8rem">生成后可在此预览</p>
        </div>
      </div>
      <div class="glass-card animate-in animate-delay-3">
        <h3 style="font-size:0.9rem;margin-bottom:12px">⚙️ 生成设置</h3>
        <div class="gen-options">
          <div class="gen-opt active"><div class="val">1080P</div><div class="label">分辨率</div></div>
          <div class="gen-opt"><div class="val">30fps</div><div class="label">帧率</div></div>
          <div class="gen-opt"><div class="val">16:9</div><div class="label">比例</div></div>
        </div>
        <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:16px">🚀 开始生成数字人视频</button>
      </div>
    </div>
  </div>
</main>
</div>
<script src="../js/app.js"></script>
</body>
</html>
